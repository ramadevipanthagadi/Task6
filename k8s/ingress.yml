apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rose-web-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: rose.example.com   # replace with your domain or IP
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rose-web-service
            port:
              number: 80
